<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ASSET Pre-Test 互動題庫</title>
  <style>
    :root {
      --bg: #f7f8f5;
      --panel: #ffffff;
      --ink: #17201b;
      --muted: #60706a;
      --line: #d9dfda;
      --accent: #1f6f61;
      --accent-strong: #124d43;
      --warn: #b75e12;
      --bad: #a43131;
      --good: #1d6b3d;
      --focus: #dfeee9;
      --shadow: 0 14px 32px rgba(23, 32, 27, .09);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    button, input { font: inherit; }
    .app { min-height: 100vh; display: grid; grid-template-columns: 300px 1fr; }
    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 18px;
      background: #eef2ee;
      border-right: 1px solid var(--line);
      overflow: auto;
    }
    main { padding: 24px; min-width: 0; }
    .brand { display: grid; gap: 4px; margin-bottom: 18px; }
    .brand h1 { margin: 0; font-size: 22px; line-height: 1.2; letter-spacing: 0; }
    .brand p { margin: 0; color: var(--muted); font-size: 14px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 16px 0; }
    .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 10px; }
    .stat b { display: block; font-size: 20px; }
    .stat span { color: var(--muted); font-size: 12px; }
    .progress { height: 10px; border-radius: 999px; background: #dfe5df; overflow: hidden; margin: 10px 0 16px; }
    .progress div { height: 100%; width: 0; background: var(--accent); transition: width .2s ease; }
    .toolbar { display: grid; gap: 8px; margin-bottom: 14px; }
    .toolbar input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      background: var(--panel);
      color: var(--ink);
    }
    .filters { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      min-height: 40px;
      padding: 8px 10px;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease, transform .05s ease;
    }
    .btn:hover { background: #f8faf8; border-color: #b9c4bd; }
    .btn:active { transform: translateY(1px); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn.primary:hover { background: var(--accent-strong); }
    .btn.active { border-color: var(--accent); background: var(--focus); color: var(--accent-strong); }
    .btn.ghost { background: transparent; }
    .question-list { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .qdot {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      min-height: 36px;
      cursor: pointer;
      color: var(--ink);
    }
    .qdot.current { outline: 2px solid var(--accent); outline-offset: 1px; }
    .qdot.answered { background: #e3f1ea; border-color: #98c4ac; }
    .qdot.flagged::after { content: " *"; color: var(--warn); font-weight: 700; }
    .qdot.miss { background: #f6e2e2; border-color: #dda7a7; }
    .card {
      max-width: 940px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .question-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
    }
    .kicker { color: var(--accent-strong); font-weight: 700; font-size: 14px; margin-bottom: 8px; }
    .question-title { margin: 0; font-size: 24px; line-height: 1.3; letter-spacing: 0; }
    .badge { display: inline-flex; align-items: center; white-space: nowrap; border-radius: 999px; border: 1px solid var(--line); padding: 6px 10px; color: var(--muted); font-size: 13px; }
    .question-body { padding: 22px 24px; }
    .options { display: grid; gap: 10px; }
    .option {
      display: grid;
      grid-template-columns: 42px 1fr;
      align-items: center;
      gap: 12px;
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: #fbfcfb;
      color: var(--ink);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      min-height: 62px;
    }
    .option:hover { border-color: #aac2b9; background: #f6faf8; }
    .option .letter {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: #e9eee9;
      font-weight: 800;
      color: var(--accent-strong);
    }
    .option.selected { border-color: var(--accent); background: var(--focus); }
    .option.correct { border-color: var(--good); background: #e4f2e9; }
    .option.incorrect { border-color: var(--bad); background: #f7e7e7; }
    .feedback {
      display: none;
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
      padding: 14px;
    }
    .feedback.show { display: block; }
    .feedback h2 { margin: 0 0 8px; font-size: 17px; letter-spacing: 0; }
    .feedback p { margin: 8px 0 0; color: var(--muted); }
    .feedback.good h2 { color: var(--good); }
    .feedback.bad h2 { color: var(--bad); }
    .rationale {
      margin-top: 14px;
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }
    .rationale h3 { margin: 0 0 6px; font-size: 14px; color: var(--accent-strong); }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 18px 24px;
      border-top: 1px solid var(--line);
      background: #f8faf8;
    }
    .summary {
      max-width: 940px;
      margin: 18px auto 0;
      color: var(--muted);
      font-size: 14px;
    }
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      aside { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
      main { padding: 16px; }
      .question-head { display: grid; }
      .question-title { font-size: 21px; }
      .question-list { grid-template-columns: repeat(8, 1fr); }
    }
    @media (max-width: 520px) {
      .question-list { grid-template-columns: repeat(6, 1fr); }
      .stats { grid-template-columns: 1fr 1fr; }
      .filters { grid-template-columns: 1fr; }
      .option { grid-template-columns: 36px 1fr; }
      .question-head, .question-body, .actions { padding-left: 16px; padding-right: 16px; }
    }
    @media print {
      aside, .actions, .summary { display: none; }
      .app { display: block; }
      main { padding: 0; }
      .card { box-shadow: none; border: 0; }
      .feedback { display: block; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <section class="brand">
        <h1>ASSET Pre-Test 互動題庫</h1>
        <p>33 題自我複習版；檢核基準為你的二次修正答案，非官方答案 key。</p>
      </section>
      <div class="stats" aria-label="作答統計">
        <div class="stat"><b id="answeredCount">0</b><span>已作答</span></div>
        <div class="stat"><b id="scoreCount">0</b><span>符合檢核</span></div>
        <div class="stat"><b id="flagCount">0</b><span>待複習</span></div>
        <div class="stat"><b id="currentNumber">1/33</b><span>目前題號</span></div>
      </div>
      <div class="progress" aria-hidden="true"><div id="progressBar"></div></div>
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="搜尋題幹或選項">
        <div class="filters">
          <button class="btn active" data-filter="all">全部</button>
          <button class="btn" data-filter="unanswered">未作答</button>
          <button class="btn" data-filter="flagged">待複習</button>
          <button class="btn" data-filter="missed">需確認</button>
        </div>
      </div>
      <div id="questionList" class="question-list" aria-label="題號列表"></div>
    </aside>
    <main>
      <article class="card" aria-live="polite">
        <div class="question-head">
          <div>
            <div class="kicker" id="questionKicker">Question 1</div>
            <h2 class="question-title" id="questionTitle"></h2>
          </div>
          <span class="badge" id="statusBadge">未作答</span>
        </div>
        <div class="question-body">
          <div id="options" class="options"></div>
          <section id="feedback" class="feedback"></section>
        </div>
        <div class="actions">
          <button class="btn" id="prevBtn">上一題</button>
          <button class="btn primary" id="nextBtn">下一題</button>
          <button class="btn" id="flagBtn">標記待複習</button>
          <button class="btn ghost" id="revealBtn">顯示判讀</button>
          <button class="btn ghost" id="resetBtn">重置作答</button>
        </div>
      </article>
      <p class="summary">操作：點選選項後會立即比對你的二次修正答案；「需確認」代表與檢核基準不同。進度會儲存在本機瀏覽器。</p>
    </main>
  </div>
  <script id="question-data" type="application/json">[
  {

      "elimination": "不要用 ASSET 是否已有更新版本來推測；應依本次通知信與線上課程頁標示的 edition 作答。"

      "elimination": "左側 colon、spleen、tail of pancreas 屬左側 medial visceral rotation；將 celiac/SMA/IMA 全部當成主要目標，較像中央大血管或左側暴露的混合描述。"

      "elimination": "直接進手術室較符合 active hemorrhage、expanding hematoma、ischemia 等 hard signs；單純觀察較適合 ABI 正常者；bedside Doppler 不能取代完整血管傷定位。"

  {
    "id": 5,
    "prompt": "Which approach is the MOST appropriate as the initial incision for an unstable patient with thoracic trauma and suspected cardiac injury?",

  {
    "id": 6,
    "prompt": "The most reliable early finding of compartment syndrome of the lower leg in a patient who can participate in an exam is:",
    "options": [
      {
        "letter": "A",
        "text": "Pulselessness in the injured limb"

    "id": 7,
    "prompt": "After exposure of the brachial artery in the distal arm, what is the BEST way to identify the brachial bifurcation and proximal radial and ulnar arteries?",

        "text": "Cricopharyngeal muscle"
      },

    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function isCorrect(q) {
      return state.answers[q.id] && state.answers[q.id] === q.answer;
    }

    function isMissed(q) {
      return state.answers[q.id] && state.answers[q.id] !== q.answer;
    }

    function matches(q) {
      const haystack = [q.prompt, ...q.options.map(o => o.text)].join(' ').toLowerCase();
      const textMatch = !query || haystack.includes(query.toLowerCase());
      if (!textMatch) return false;
      if (filter === 'unanswered') return !state.answers[q.id];
      if (filter === 'flagged') return !!state.flagged[q.id];
      if (filter === 'missed') return isMissed(q);
      return true;
    }

    function visibleQuestions() {
      return questions.filter(matches);
    }

    function renderStats() {
      const answered = questions.filter(q => state.answers[q.id]).length;
      const score = questions.filter(isCorrect).length;
      const flagged = questions.filter(q => state.flagged[q.id]).length;
      els.answeredCount.textContent = answered;
      els.scoreCount.textContent = score;
      els.flagCount.textContent = flagged;
      els.currentNumber.textContent = (current + 1) + '/' + questions.length;
      els.progressBar.style.width = Math.round(answered / questions.length * 100) + '%';
    }

    function renderList() {
      els.questionList.innerHTML = '';
      const visible = new Set(visibleQuestions().map(q => q.id));
      for (const q of questions) {
        const btn = document.createElement('button');
        btn.className = 'qdot';
        btn.textContent = q.id;
        btn.title = '第 ' + q.id + ' 題';
        btn.disabled = !visible.has(q.id);
        if (q.id === questions[current].id) btn.classList.add('current');
        if (state.answers[q.id]) btn.classList.add('answered');
        if (state.flagged[q.id]) btn.classList.add('flagged');
        if (isMissed(q)) btn.classList.add('miss');
        btn.addEventListener('click', () => { current = q.id - 1; render(); });
        els.questionList.appendChild(btn);
      }
    }

    function renderQuestion() {
      const q = questions[current];
      const selected = state.answers[q.id];
      const reveal = !!state.reveal[q.id] || !!selected;
      els.questionKicker.textContent = 'Question ' + q.id;
      els.questionTitle.textContent = q.prompt;
      els.statusBadge.textContent = selected ? (isCorrect(q) ? '符合檢核' : '需確認') : '未作答';
      els.statusBadge.style.color = selected ? (isCorrect(q) ? 'var(--good)' : 'var(--bad)') : 'var(--muted)';
      els.options.innerHTML = '';
      for (const opt of q.options) {
        const btn = document.createElement('button');
        btn.className = 'option';
        if (selected === opt.letter) btn.classList.add('selected');
        if (selected && opt.letter === q.answer) btn.classList.add('correct');
        if (selected === opt.letter && selected !== q.answer) btn.classList.add('incorrect');
        btn.innerHTML = '<span class="letter">' + opt.letter + '</span><span>' + escapeHtml(opt.text) + '</span>';
        btn.addEventListener('click', () => {
          state.answers[q.id] = opt.letter;
          state.reveal[q.id] = true;
          saveState();
          render();
        });
        els.options.appendChild(btn);
      }
      renderFeedback(q, reveal);
      els.flagBtn.textContent = state.flagged[q.id] ? '取消待複習' : '標記待複習';
      els.revealBtn.textContent = reveal ? '隱藏判讀' : '顯示判讀';
      els.prevBtn.disabled = current === 0;
      els.nextBtn.disabled = current === questions.length - 1;
    }

    function renderFeedback(q, reveal) {
      const selected = state.answers[q.id];
      if (!reveal) {
        els.feedback.className = 'feedback';
        els.feedback.innerHTML = '';
        return;
      }
      const status = selected ? (isCorrect(q) ? 'good' : 'bad') : '';
      const heading = selected ? (isCorrect(q) ? '符合你的二次修正答案' : '與你的二次修正答案不同') : '判讀提示';
      const selectedLine = selected ? '<p>你目前選擇：' + selected + '。檢核基準：' + q.answer + '。</p>' : '<p>尚未作答；可先閱讀判讀依據後再選。</p>';
      els.feedback.className = 'feedback show ' + status;
      els.feedback.innerHTML = '<h2>' + heading + '</h2>' + selectedLine +
        '<div class="rationale"><h3>判讀依據</h3><p>' + escapeHtml(q.rationale.basis || '此題請回到 ASSET 暴露原則與題幹關鍵字判斷。') + '</p>' +
        '<h3>選項排除方向</h3><p>' + escapeHtml(q.rationale.elimination || '比較各選項是否符合題幹中的解剖區域、生理狀態與 initial/best/temporizing 等關鍵字。') + '</p></div>';
    }

    function render() {
      renderStats();
      renderList();
      renderQuestion();
    }

    function move(step) {
      current = Math.max(0, Math.min(questions.length - 1, current + step));
      render();
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[ch]));
    }

    els.prevBtn.addEventListener('click', () => move(-1));
    els.nextBtn.addEventListener('click', () => move(1));
    els.flagBtn.addEventListener('click', () => {
      const id = questions[current].id;
      state.flagged[id] = !state.flagged[id];
      if (!state.flagged[id]) delete state.flagged[id];
      saveState();
      render();
    });
    els.revealBtn.addEventListener('click', () => {
      const id = questions[current].id;
      state.reveal[id] = !state.reveal[id];
      saveState();
      render();
    });
    els.resetBtn.addEventListener('click', () => {
      if (!confirm('確定要清除本機作答紀錄與待複習標記？')) return;
      state = { answers: {}, flagged: {}, reveal: {} };
      saveState();
      render();
    });
    els.searchInput.addEventListener('input', e => {
      query = e.target.value.trim();
      const visible = visibleQuestions();
      if (visible.length && !visible.some(q => q.id === questions[current].id)) current = visible[0].id - 1;
      render();
    });
    document.querySelectorAll('[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.filter;
        const visible = visibleQuestions();
        if (visible.length && !visible.some(q => q.id === questions[current].id)) current = visible[0].id - 1;
        render();
      });
    });
    document.addEventListener('keydown', e => {
      if (e.target && ['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
      if (e.key === 'ArrowLeft') move(-1);
      if (e.key === 'ArrowRight') move(1);
      const letter = e.key.toUpperCase();
      if (letters.includes(letter)) {
        const q = questions[current];
        if (q.options.some(o => o.letter === letter)) {
          state.answers[q.id] = letter;
          state.reveal[q.id] = true;
          saveState();
          render();
        }
      }
    });
    render();
  </script>
</body>
</html>
